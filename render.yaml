# Optional Render Blueprint: https://render.com/docs/blueprint-spec
# Database: use Supabase (or Neon). Apply schema with Supabase CLI `db push` or Alembic — not on Render.
# In the dashboard, set secret DATABASE_URL and CORS_ORIGINS after blueprint import.

services:
  - type: web
    name: audio-transcription-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: WHISPER_MODEL
        value: tiny
      - key: WHISPER_LOW_MEMORY
        value: "1"
      - key: API_UPLOAD_MAX_MB
        value: "5"
      - key: BATCH_MAX_FILES
        value: "2"
      - key: YOUTUBE_MAX_DOWNLOAD_MB
        value: "5"
